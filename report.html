<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月次レポート - 勤怠管理システム</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-logo">
      <span>勤怠管理</span>
    </div>
    <nav class="header-nav">
      <a href="dashboard.html">打刻</a>
      <a href="history.html">勤怠履歴</a>
      <a href="shift.html">シフト</a>
      <a href="approval.html">申請</a>
      <a href="report.html" class="active">レポート</a>
    </nav>
    <div class="header-user">
      <span class="header-user-name"></span>
      <button class="btn-logout">ログアウト</button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <div class="container">
      <!-- ヘッダーバー -->
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-between align-center" style="flex-wrap: wrap; gap: 15px;">
            <div class="d-flex align-center gap-2">
              <button class="btn btn-outline" id="prevMonth">&lt; 前月</button>
              <h2 id="reportTitle" style="margin: 0 20px;">----年--月</h2>
              <button class="btn btn-outline" id="nextMonth">翌月 &gt;</button>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary" id="btnExportCSV">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                CSV出力
              </button>
              <button class="btn btn-secondary" id="btnExportAllCSV" style="display: none;">
                全員のCSV出力
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 統計カード -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-icon">📅</div>
          <div class="stat-card-value" id="statWorkDays">--</div>
          <div class="stat-card-label">出勤日数</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">⏱️</div>
          <div class="stat-card-value" id="statTotalHours">--</div>
          <div class="stat-card-label">総労働時間</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">🌙</div>
          <div class="stat-card-value" id="statOvertimeHours">--</div>
          <div class="stat-card-label">残業時間</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">☕</div>
          <div class="stat-card-value" id="statBreakHours">--</div>
          <div class="stat-card-label">休憩時間</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">⏰</div>
          <div class="stat-card-value" id="statLateCount">--</div>
          <div class="stat-card-label">遅刻回数</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon">📊</div>
          <div class="stat-card-value" id="statAverageHours">--</div>
          <div class="stat-card-label">平均労働時間/日</div>
        </div>
      </div>

      <!-- グラフ -->
      <div class="card">
        <div class="card-header">
          <span>日別労働時間グラフ</span>
        </div>
        <div class="card-body">
          <div class="chart-container">
            <canvas id="workChart"></canvas>
          </div>
        </div>
      </div>

      <!-- 詳細テーブル -->
      <div class="card">
        <div class="card-header">
          <span>勤怠詳細</span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>日</th>
                  <th>曜日</th>
                  <th>出勤</th>
                  <th>退勤</th>
                  <th>休憩</th>
                  <th>労働時間</th>
                  <th>残業</th>
                </tr>
              </thead>
              <tbody id="reportTable">
                <!-- レポートテーブルがここに表示される -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/report.js"></script>
  <script>
    // 管理者の場合は全員のCSV出力ボタンを表示
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isAdmin()) {
        document.getElementById('btnExportAllCSV').style.display = 'inline-flex';
      }
    });
  </script>
</body>
</html>
