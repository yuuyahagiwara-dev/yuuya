<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 勤怠管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <h1>勤怠管理</h1>
        <p>Attendance Management System</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="example@company.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="パスワードを入力"
            required
          >
        </div>

        <div class="form-group d-flex justify-between align-center">
          <label class="form-check">
            <input type="checkbox" id="remember">
            <span>ログイン情報を保存</span>
          </label>
          <a href="#" class="form-link">パスワードをお忘れの方</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          ログイン
        </button>
      </form>

      <div class="mt-4 text-center">
        <p class="text-muted" style="font-size: 0.85rem;">
          デモ用アカウント
        </p>
        <div style="background: #f5f7fa; padding: 15px; border-radius: 8px; margin-top: 10px; text-align: left; font-size: 0.85rem;">
          <p><strong>管理者:</strong> admin@example.com / admin123</p>
          <p style="margin-top: 5px;"><strong>一般:</strong> user@example.com / user123</p>
        </div>
      </div>

      <div class="mt-3" style="border-top: 1px solid #dadce0; padding-top: 20px;">
        <p class="text-center text-muted" style="font-size: 0.8rem; margin-bottom: 10px;">
          または以下でログイン
        </p>
        <div class="d-flex gap-2" style="justify-content: center;">
          <button type="button" class="btn btn-outline" style="flex: 1; max-width: 150px;" onclick="demoLogin('google')">
            <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px;">
              <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
              <path fill="#34A853" d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9.003 18z"/>
              <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
              <path fill="#EA4335" d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z"/>
            </svg>
            Google
          </button>
          <button type="button" class="btn btn-outline" style="flex: 1; max-width: 150px; background: #000; color: #fff;" onclick="demoLogin('apple')">
            <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px;">
              <path fill="currentColor" d="M14.94 9.88c-.02-2.02 1.65-2.99 1.72-3.03-.94-1.37-2.4-1.56-2.92-1.58-1.24-.13-2.43.73-3.06.73-.63 0-1.61-.71-2.65-.69-1.36.02-2.62.79-3.32 2.01-1.42 2.46-.36 6.1 1.02 8.1.68.98 1.48 2.07 2.54 2.03 1.02-.04 1.4-.66 2.63-.66s1.58.66 2.66.64c1.1-.02 1.79-.99 2.46-1.98.78-1.13 1.09-2.23 1.11-2.29-.02-.01-2.13-.82-2.15-3.24zM12.95 3.41c.56-.68.94-1.63.84-2.57-.81.03-1.79.54-2.37 1.22-.52.6-.98 1.56-.86 2.48.91.07 1.83-.46 2.39-1.13z"/>
            </svg>
            Apple
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // デモログイン
    function demoLogin(provider) {
      alert(`${provider}でのログインは現在利用できません。\nデモ用アカウントをご利用ください。`);
    }

    // デバッグ: 初期化確認
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Storage初期化チェック:', Storage.getUsers());
      // LocalStorageが空の場合は再初期化
      if (!Storage.getUsers() || Storage.getUsers().length === 0) {
        console.log('ユーザーデータがないため再初期化');
        Storage.initialize();
      }
    });
  </script>
</body>
</html>
